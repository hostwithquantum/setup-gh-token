name: Setup GitHub Token
description: Create a GitHub App token and resolve bot committer identity

inputs:
  client-id:
    description: "Client ID (former: App ID)"
    required: true
  private-key:
    description: "Private key"
    required: true
  owner:
    description: "owner/user name, passed on to actions/create-github-app-token"
    required: false
    default: ${{ github.repository_owner }}
  repositories:
    description: "repositories, passed on to actions/create-github-app-token"
    default: ""
    required: false

outputs:
  token:
    description: "GitHub App installation token"
    value: ${{ steps.generate-token.outputs.token }}
  committer-name:
    description: "Bot committer name (e.g. my-app[bot])"
    value: ${{ steps.generate-token.outputs.app-slug }}[bot]
  committer-email:
    description: "Bot committer email (e.g. 12345+my-app[bot]@users.noreply.github.com)"
    value: ${{ steps.get-user-id.outputs.user-id }}+${{ steps.generate-token.outputs.app-slug }}[bot]@users.noreply.github.com

runs:
  using: composite
  steps:
    - id: generate-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ inputs.owner }}
        repositories: ${{ inputs.repositories }}
    - id: get-user-id
      shell: bash
      run: echo "user-id=$(gh api "/users/${SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
      env:
        SLUG: ${{ steps.generate-token.outputs.app-slug }}
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
